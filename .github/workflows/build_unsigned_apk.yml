name: Build unsigned APK

# Manual trigger only. Builds release APKs and uploads them as a workflow
# artifact. The release build type has no signing config, so the produced
# APKs are unsigned and meant to be signed manually before installing.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v7

      - name: Setup java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build unsigned release APKs
        run: ./gradlew assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: termux-app-unsigned-release-apks
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
